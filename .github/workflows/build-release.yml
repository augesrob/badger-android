name: Build & Release APK

on:
  push:
    branches: [ main ]
    paths-ignore:
      - 'app/build.gradle.kts'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Cache Gradle
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ hashFiles('**/*.gradle.kts', '**/gradle-wrapper.properties') }}
          restore-keys: gradle-

      - name: Get current versionCode
        id: version
        run: |
          CURRENT=$(grep 'versionCode' app/build.gradle.kts | grep -o '[0-9]*')
          NEW=$((CURRENT + 1))
          echo "current=$CURRENT" >> $GITHUB_OUTPUT
          echo "new=$NEW" >> $GITHUB_OUTPUT
          echo "tag=v$NEW" >> $GITHUB_OUTPUT

      - name: Bump versionCode in build.gradle.kts
        run: |
          sed -i "s/versionCode = ${{ steps.version.outputs.current }}/versionCode = ${{ steps.version.outputs.new }}/" app/build.gradle.kts
          sed -i "s/versionName = \".*\"/versionName = \"${{ steps.version.outputs.new }}.0\"/" app/build.gradle.kts

      - name: Commit version bump
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add app/build.gradle.kts
          git commit -m "chore: bump versionCode to ${{ steps.version.outputs.new }} [skip ci]"
          git push

      - name: Make gradlew executable
        run: chmod +x gradlew

      - name: Build Debug APK
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: ./gradlew assembleDebug

      - name: Rename APK
        run: |
          mv app/build/outputs/apk/debug/app-debug.apk \
             app/build/outputs/apk/debug/badger-${{ steps.version.outputs.tag }}.apk

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.version.outputs.tag }}
          name: "Badger ${{ steps.version.outputs.tag }}"
          body: |
            Auto-built from commit ${{ github.sha }}
            
            **Changes:** ${{ github.event.head_commit.message }}
          files: app/build/outputs/apk/debug/badger-${{ steps.version.outputs.tag }}.apk
          draft: false
          prerelease: false
